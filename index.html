<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Louis Chiron — Affiches & Designs</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:  #2c3e50;
      --cream: #f7f4ef;
      --white: #ffffff;
      --muted: #8a9aaa;
      --rule:  rgba(44,62,80,0.11);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--white);
      color: var(--blue);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ══ BURGER ══ */
    .burger-btn {
      position: fixed; top: 28px; right: 36px; z-index: 600;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; background: none; border: none;
    }
    .burger-box { width: 28px; display: flex; flex-direction: column; gap: 6px; }
    .burger-box span {
      display: block; height: 1.5px; background: var(--blue);
      transition: all 0.4s cubic-bezier(0.76,0,0.24,1); transform-origin: center;
    }
    .burger-box span:nth-child(2) { width: 70%; margin-left: auto; }
    body.menu-open .burger-box span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    body.menu-open .burger-box span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    body.menu-open .burger-box span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }
    body.menu-open .burger-box span { background: var(--cream); }

    /* ══ MENU PLEIN ÉCRAN ══ */
    .fullmenu {
      position: fixed; inset: 0; background: var(--blue); z-index: 500;
      display: flex; align-items: center; padding: 80px 10vw;
      clip-path: circle(0% at calc(100% - 60px) 52px);
      transition: clip-path 0.75s cubic-bezier(0.76,0,0.24,1);
      pointer-events: none;
    }
    body.menu-open .fullmenu { clip-path: circle(150% at calc(100% - 60px) 52px); pointer-events: all; }
    .menu-nav { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .menu-nav li { overflow: hidden; }
    .menu-nav a {
      display: block;
      font-family: 'Cormorant Garamond', serif; font-weight: 300;
      font-size: clamp(38px, 6vw, 80px); line-height: 1.08;
      color: var(--cream); text-decoration: none; letter-spacing: -1px;
      transform: translateY(110%);
      transition: transform 0.7s cubic-bezier(0.76,0,0.24,1), color 0.2s;
    }
    .menu-nav a:hover { color: rgba(247,244,239,0.38); }
    body.menu-open .menu-nav li:nth-child(1) a { transform: translateY(0); transition-delay: 0.12s; }
    body.menu-open .menu-nav li:nth-child(2) a { transform: translateY(0); transition-delay: 0.18s; }
    body.menu-open .menu-nav li:nth-child(3) a { transform: translateY(0); transition-delay: 0.24s; }
    body.menu-open .menu-nav li:nth-child(4) a { transform: translateY(0); transition-delay: 0.30s; }
    body.menu-open .menu-nav li:nth-child(5) a { transform: translateY(0); transition-delay: 0.36s; }
    body.menu-open .menu-nav li:nth-child(6) a { transform: translateY(0); transition-delay: 0.42s; }
    body.menu-open .menu-nav li:nth-child(7) a { transform: translateY(0); transition-delay: 0.48s; }
    .menu-footer {
      position: absolute; bottom: 40px; left: 10vw; right: 10vw;
      display: flex; justify-content: space-between; align-items: flex-end;
      opacity: 0; transition: opacity 0.4s 0.55s;
    }
    body.menu-open .menu-footer { opacity: 1; }
    .menu-email { font-size: 13px; color: rgba(247,244,239,0.35); letter-spacing: 0.06em; }
    .menu-socials { display: flex; gap: 24px; }
    .menu-socials a {
      font-size: 11px; color: rgba(247,244,239,0.3);
      text-decoration: none; letter-spacing: 0.15em; text-transform: uppercase;
      transition: color 0.2s;
    }
    .menu-socials a:hover { color: var(--cream); }

    /* ══ LOGO ══ */
    .site-logo {
      position: fixed; top: 30px; left: 36px; z-index: 600;
      font-family: 'Cormorant Garamond', serif; font-weight: 600;
      font-size: 20px; letter-spacing: 0.04em;
      color: var(--blue); text-decoration: none; transition: color 0.3s;
    }
    body.menu-open .site-logo { color: var(--cream); }

    /* ══ PAGE HEADER ══ */
    .page-header {
      padding: 130px 40px 56px;
      border-bottom: 1px solid var(--rule);
      display: flex; justify-content: space-between; align-items: flex-end;
      gap: 32px; flex-wrap: wrap;
    }
    .header-eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
      opacity: 0; animation: up 0.9s 0.1s forwards;
    }
    .header-eyebrow::before { content:''; width: 24px; height: 1px; background: var(--muted); }
    .page-title {
      font-family: 'Cormorant Garamond', serif; font-weight: 300;
      font-size: clamp(44px, 6vw, 80px); line-height: 0.95; letter-spacing: -2px;
      color: var(--blue);
      opacity: 0; animation: up 0.9s 0.2s forwards;
    }
    .page-title em { font-style: italic; color: var(--muted); }
    .header-right {
      text-align: right;
      opacity: 0; animation: up 0.9s 0.35s forwards;
    }
    .header-count {
      font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 300;
      color: var(--blue); letter-spacing: -1px; line-height: 1;
    }
    .header-count span { font-size: 14px; color: var(--muted); letter-spacing: 0.1em; }
    .header-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; margin-top: 4px; }

    /* ══ GRILLE AFFICHES 3 colonnes, 3:4 ══ */
    .affiches-section { padding: 56px 40px 72px; }

    .affiches-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    /* ══ CARTE AFFICHE ══ */
    .affiche-card {
      position: relative;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background: #d4d8dd;
      cursor: pointer;
    }
    .affiche-card::after {
      content: '';
      position: absolute; inset: 0; z-index: 10;
      -webkit-user-drag: none;
    }
    .affiche-bg {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: transform 0.7s cubic-bezier(0.76,0,0.24,1), filter 0.3s;
      filter: saturate(0.9) brightness(0.98);
      pointer-events: none;
    }
    .affiche-card:hover .affiche-bg {
      transform: scale(1.05);
      filter: saturate(1.05) brightness(1.02);
    }
    /* Overlay hover */
    .affiche-overlay {
      position: absolute; inset: 0; z-index: 5;
      background: linear-gradient(to top, rgba(26,37,48,0.72) 0%, transparent 50%);
      opacity: 0; transition: opacity 0.35s;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 18px 16px; pointer-events: none;
    }
    .affiche-card:hover .affiche-overlay { opacity: 1; }
    .affiche-meta {
      transform: translateY(8px); opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
    }
    .affiche-card:hover .affiche-meta { transform: none; opacity: 1; }
    .affiche-num {
      font-size: 9px; letter-spacing: 0.22em; color: rgba(255,255,255,0.4); margin-bottom: 3px;
    }
    .affiche-label {
      font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 300;
      color: rgba(255,255,255,0.9); letter-spacing: 0.03em;
    }

    /* ══ FOOTER ══ */
    footer {
      background: #1a252f; border-top: 1px solid rgba(247,244,239,0.06);
      padding: 32px 40px; display: flex; flex-direction: column;
      align-items: center; gap: 14px;
    }
    .footer-cartoon {
      width: 80px; height: auto; opacity: 0.7;
      filter: brightness(0) invert(1);
      -webkit-user-drag: none; pointer-events: none;
    }
    .footer-copy { font-size: 11px; color: rgba(247,244,239,0.28); letter-spacing: 0.1em; }

    @keyframes up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 900px) {
      .page-header, .affiches-section { padding-left: 20px; padding-right: 20px; }
      footer { padding: 24px 20px; }
      .burger-btn { right: 16px; }
      .site-logo { left: 16px; }
    }
    @media (max-width: 640px) {
      .affiches-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 400px) {
      .affiches-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<script>
  /* ── Burger ── */
  document.getElementById('burgerBtn').addEventListener('click', () =>
    document.body.classList.toggle('menu-open')
  );
  document.querySelectorAll('.menu-link').forEach(a =>
    a.addEventListener('click', () => document.body.classList.remove('menu-open'))
  );

  /* ── Protection ── */
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    if (e.key === 'F12' || e.key === 'PrintScreen' ||
        (e.ctrlKey && ['s','u','p'].includes(e.key.toLowerCase())) ||
        (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase())))
      e.preventDefault();
  });
  document.addEventListener('selectstart', e => e.preventDefault());
  document.querySelectorAll('.affiche-card').forEach(c =>
    c.addEventListener('dragstart', e => e.preventDefault())
  );
  setInterval(() => {
    const open = window.outerWidth - window.innerWidth > 160 ||
                 window.outerHeight - window.innerHeight > 160;
    document.querySelectorAll('.affiche-bg').forEach(el => {
      el.style.filter = open ? 'blur(18px) brightness(0.3)' : '';
    });
  }, 1000);
</script>
